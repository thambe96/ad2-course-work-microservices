server:
  port: 8080

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      routes:
        - id: AUTH-SERVICE
          uri: http://localhost:8085
          predicates:
            - Path=/api/auth/**

        - id: AUTOMATION-CONTROL-SERVICE
          uri: http://localhost:8083
          predicates:
            - Path=/api/automation/**





eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

