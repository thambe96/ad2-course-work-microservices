server:
  port: 8083

spring:
  application:
    name: AUTOMATION-CONTROL-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/automation_service_db?createDatabaseIfNotExist=true
    username: root
    password: rooty@
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update




eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

